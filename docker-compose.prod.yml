# =============================================================================
# Production Compose — pulls pre-built image from GHCR
# =============================================================================
# No source code needed on the server. CI builds and pushes the image.
# Only this file, Caddyfile, and .env are needed on the droplet.
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/alpo190010/alpo:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      LEMONSQUEEZY_WEBHOOK_SECRET: ${LEMONSQUEEZY_WEBHOOK_SECRET}
      DB_SSL: ${DB_SSL:-false}
      PORT: "3000"
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      AUTH_URL: ${AUTH_URL:-https://alpo.ai}
    env_file:
      - .env

  api:
    image: ghcr.io/alpo190010/alpo-api:latest
    restart: unless-stopped
    init: true
    shm_size: 256mb
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_SSL: ${DB_SSL:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://alpo.ai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      LEMONSQUEEZY_WEBHOOK_SECRET: ${LEMONSQUEEZY_WEBHOOK_SECRET}
      LEMONSQUEEZY_VARIANT_STARTER: ${LEMONSQUEEZY_VARIANT_STARTER}
      LEMONSQUEEZY_VARIANT_GROWTH: ${LEMONSQUEEZY_VARIANT_GROWTH}
      LEMONSQUEEZY_VARIANT_PRO: ${LEMONSQUEEZY_VARIANT_PRO}
      AUTH_SECRET: ${AUTH_SECRET}
      WEBAPP_URL: ${WEBAPP_URL:-https://alpo.ai}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
