# =============================================================================
# Deploy to Production
# =============================================================================
# Triggers on push to main.
#   1. Builds webapp + api Docker images in parallel
#   2. Pushes both to ghcr.io/alpo190010/alpo and ghcr.io/alpo190010/alpo-api
#   3. SSHes into the droplet, pulls both images, restarts all services
#
# Required GitHub Secrets:
#   SSH_PRIVATE_KEY — Private SSH key for the droplet (full PEM with newline)
#   DROPLET_IP     — Droplet IP (134.199.142.211)
#   GH_PAT         — GitHub PAT with read:packages scope (for droplet to pull
#                     from GHCR). Create at github.com/settings/tokens.
#   AUTH_SECRET    — Auth.js secret for token encryption (openssl rand -base64 33)
#   AUTH_GOOGLE_ID — Google OAuth client ID
#   AUTH_GOOGLE_SECRET — Google OAuth client secret
#
# Required GitHub Variables:
#   NEXT_PUBLIC_API_URL              — API base URL (e.g. https://api.alpo.ai)
#   NEXT_PUBLIC_POSTHOG_KEY          — PostHog project key
#   NEXT_PUBLIC_POSTHOG_HOST         — PostHog host
#   NEXT_PUBLIC_LEMONSQUEEZY_CHECKOUT_URL — LemonSqueezy checkout URL
#   NEXT_PUBLIC_BASE_URL             — Public base URL
#
# GHCR push uses the built-in GITHUB_TOKEN. GHCR pull on the droplet uses
# GH_PAT because the repo/package is private.
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Build & push webapp image
  # ---------------------------------------------------------------------------
  build-and-push-webapp:
    name: Build & Push Webapp
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/alpo190010/alpo
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./webapp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_LEMONSQUEEZY_CHECKOUT_URL=${{ vars.NEXT_PUBLIC_LEMONSQUEEZY_CHECKOUT_URL }}
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}

  # ---------------------------------------------------------------------------
  # Build & push api image
  # ---------------------------------------------------------------------------
  build-and-push-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/alpo190010/alpo-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ---------------------------------------------------------------------------
  # Deploy both services to droplet
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: [build-and-push-webapp, build-and-push-api]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy config files to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: /opt/alpo

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -euo pipefail
            echo "==> Deploying alpo (webapp + api)..."

            cd /opt/alpo

            echo "==> Logging in to GHCR..."
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u alpo190010 --password-stdin

            echo "==> Pulling latest images..."
            docker pull ghcr.io/alpo190010/alpo:latest
            docker pull ghcr.io/alpo190010/alpo-api:latest

            echo "==> Restarting services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Reloading Caddy config..."
            docker compose -f docker-compose.prod.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true

            echo "==> Waiting for services to start..."
            sleep 10

            echo "==> Service status:"
            docker compose -f docker-compose.prod.yml ps -a

            # Show logs for any non-running containers
            for svc in app api; do
              STATUS=$(docker compose -f docker-compose.prod.yml ps --format '{{.State}}' $svc 2>/dev/null || echo "missing")
              if [ "$STATUS" != "running" ]; then
                echo "==> ⚠️  $svc is $STATUS — last 30 log lines:"
                docker compose -f docker-compose.prod.yml logs --tail=30 $svc 2>/dev/null || true
              fi
            done

            echo "==> Deploy complete."

      - name: Health check (webapp)
        run: |
          echo "Waiting for containers to stabilize..."
          sleep 30

          MAX_RETRIES=5
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Webapp health check attempt $i/$MAX_RETRIES..."
            if curl -sf --max-time 10 "http://${{ secrets.DROPLET_IP }}/api/health"; then
              echo ""
              echo "✅ Webapp health check passed."
              exit 0
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done

          echo "❌ Webapp health check failed after $MAX_RETRIES attempts."
          exit 1

      - name: Health check (api)
        run: |
          MAX_RETRIES=5
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "API health check attempt $i/$MAX_RETRIES..."
            if curl -sf --max-time 10 -H "Host: api.alpo.ai" "http://${{ secrets.DROPLET_IP }}/health"; then
              echo ""
              echo "✅ API health check passed."
              exit 0
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done

          echo "❌ API health check failed after $MAX_RETRIES attempts."
          exit 1
