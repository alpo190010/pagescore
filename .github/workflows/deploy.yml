# =============================================================================
# Deploy to Production
# =============================================================================
# Triggers on push to main.
#   1. Builds Docker image in GitHub Actions
#   2. Pushes to ghcr.io/alpo190010/alpo
#   3. SSHes into the droplet, pulls the new image, restarts
#
# Required GitHub Secrets:
#   SSH_PRIVATE_KEY — Private SSH key for the droplet (full PEM with newline)
#   DROPLET_IP     — Droplet IP (134.199.142.211)
#   GH_PAT         — GitHub PAT with read:packages scope (for droplet to pull
#                     from GHCR). Create at github.com/settings/tokens.
#
# GHCR push uses the built-in GITHUB_TOKEN. GHCR pull on the droplet uses
# GH_PAT because the repo/package is private.
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_LEMONSQUEEZY_CHECKOUT_URL=${{ vars.NEXT_PUBLIC_LEMONSQUEEZY_CHECKOUT_URL }}
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "==> Deploying alpo..."

            cd /opt/alpo

            echo "==> Logging in to GHCR..."
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u alpo190010 --password-stdin

            echo "==> Pulling latest image..."
            docker pull ghcr.io/alpo190010/alpo:latest

            echo "==> Restarting app service..."
            docker compose -f docker-compose.prod.yml up -d

            echo "==> Service status:"
            docker compose -f docker-compose.prod.yml ps

            echo "==> Deploy complete."

      - name: Health check
        run: |
          echo "Waiting for containers to stabilize..."
          sleep 30

          MAX_RETRIES=5
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i/$MAX_RETRIES..."
            if curl -sf --max-time 10 "http://${{ secrets.DROPLET_IP }}/api/health"; then
              echo ""
              echo "✅ Health check passed."
              exit 0
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done

          echo "❌ Health check failed after $MAX_RETRIES attempts."
          exit 1
